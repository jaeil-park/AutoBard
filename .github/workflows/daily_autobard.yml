name: Daily AutoBard Production

on:
  schedule:
    # Runs at 00:00 UTC (9:00 AM KST) daily
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  produce-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to update scheduler state

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reconstruct Credentials
        env:
          ENV_BASE64: ${{ secrets.ENV_BASE64 }}
          CLIENT_SECRET_BASE64: ${{ secrets.CLIENT_SECRET_BASE64 }}
          YOUTUBE_TOKEN_BASE64: ${{ secrets.YOUTUBE_TOKEN_BASE64 }}
        run: |
          mkdir -p temp
          echo "$ENV_BASE64" | base64 -d > .env
          echo "$CLIENT_SECRET_BASE64" | base64 -d > client_secret.json
          echo "$YOUTUBE_TOKEN_BASE64" | base64 -d > youtube_token.pickle

      - name: Run AutoBard Daily Session
        run: |
          python main.py --auto --upload

      - name: Commit Scheduler State
        run: |
          git config --global user.name "AutoBard Automator"
          git config --global user.email "autobard@github-actions.com"
          git add temp/scheduler_state.json
          git commit -m "Update scheduler state for next teaser [skip ci]" || echo "No changes to commit"
          git push
